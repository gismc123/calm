server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the service worker or HTML — critical for PWA updates to propagate
    location ~* (sw\.js|index\.html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache icons aggressively — they rarely change
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Moderate caching for JS and CSS (SW handles versioning)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
